name: Weekly Comms Digest

permissions:
  contents: read
  pull-requests: read

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays at 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print payload instead of posting to Slack'
        required: false
        default: 'false'
        type: boolean

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run digest script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.COMMSDIGEST_SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/weekly_comms_digest.py --dry-run
          else
            python scripts/weekly_comms_digest.py
          fi
