name: Run Unit Tests

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - "main"

concurrency:
  # Cancel previous jobs
  group: unit_tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit-tests:
    name: "Backend Checks"
    runs-on: ubuntu-latest
    environment: testing_env
    env:
      TEST_DATABASE_URL: "postgres://postgres:postgres@localhost:5432/test_metaculus"
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: test_metaculus
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: "redis:8.2.1-alpine"
        env:
          ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 6379:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Check Ruff formatting
        if: ${{ !cancelled() }}
        run: uv run ruff format --check .
      - name: Run Ruff Linter
        if: ${{ !cancelled() }}
        run: uv run ruff check .
      - name: Check migrations
        if: ${{ !cancelled() }}
        run: uv run python manage.py makemigrations --dry-run --check
      - name: "Run the backend unit tests"
        if: ${{ !cancelled() }}
        run: uv run pytest ./tests/unit

  frontend-unit-tests:
    name: "Frontend Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: front_end/.nvmrc
          cache: npm
          cache-dependency-path: front_end/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: front_end

      - name: prettier version
        run: npx prettier -v
        working-directory: front_end

      - name: check formatting
        run: npm run format:check
        working-directory: front_end

      - name: check linters
        run: npm run lint
        working-directory: front_end

      - name: Run unit tests
        run: npm test
        working-directory: front_end
